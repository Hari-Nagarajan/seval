name: Update Homebrew Formula

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for release assets
        run: sleep 30

      - name: Download release assets and compute checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release download "$TAG" --repo "$REPO" --dir assets

          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          echo "SHA_MACOS_ARM=$(shasum -a 256 assets/seval-macos-aarch64.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_MACOS_X86=$(shasum -a 256 assets/seval-macos-x86_64.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_LINUX_X86=$(shasum -a 256 assets/seval-linux-x86_64.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: Hari-Nagarajan/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          cat > Formula/seval.rb << EOF
          class Seval < Formula
            desc "AI-powered offensive security assistant for your terminal"
            homepage "https://github.com/Hari-Nagarajan/seval"
            license "AGPL-3.0-only"
            version "$VERSION"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/Hari-Nagarajan/seval/releases/download/v$VERSION/seval-macos-aarch64.tar.gz"
                sha256 "$SHA_MACOS_ARM"

                def install
                  bin.install "seval-macos-aarch64" => "seval"
                end
              else
                url "https://github.com/Hari-Nagarajan/seval/releases/download/v$VERSION/seval-macos-x86_64.tar.gz"
                sha256 "$SHA_MACOS_X86"

                def install
                  bin.install "seval-macos-x86_64" => "seval"
                end
              end
            end

            on_linux do
              url "https://github.com/Hari-Nagarajan/seval/releases/download/v$VERSION/seval-linux-x86_64.tar.gz"
              sha256 "$SHA_LINUX_X86"

              def install
                bin.install "seval-linux-x86_64" => "seval"
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/seval --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/seval.rb
          git commit -m "chore: update seval to $VERSION"
          git push
